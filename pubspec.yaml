name: textemplate
description: 文本模板生成器 - 快速生成包含变量的文字内容
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  fluent_ui: ^4.10.1
  gap: ^3.0.1
  shared_preferences: ^2.5.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
